<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Lazy YT Downloader</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0c0c0c;
    --surface: #161616;
    --surface2: #1e1e1e;
    --border: rgba(255,255,255,0.07);
    --border-active: rgba(255,255,255,0.15);
    --text: #f0f0f0;
    --text-muted: #666;
    --text-dim: #444;
    --accent: #e8a020;
    --accent-dim: rgba(232,160,32,0.12);
    --accent-hover: #f0b030;
    --success: #3a9e6e;
    --error: #c04040;
    --font-mono: 'Cascadia Code', 'Fira Code', 'Consolas', monospace;
    --radius: 6px;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Segoe UI', system-ui, sans-serif;
    font-size: 14px;
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    -webkit-app-region: no-drag;
    user-select: none;
  }

  /* Title bar */
  .titlebar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 16px;
    height: 40px;
    background: var(--bg);
    border-bottom: 1px solid var(--border);
    -webkit-app-region: drag;
    flex-shrink: 0;
  }
  .titlebar-left {
    display: flex;
    align-items: center;
    gap: 8px;
    -webkit-app-region: no-drag;
  }
  .app-icon {
    width: 18px;
    height: 18px;
    background: var(--accent);
    border-radius: 4px;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .app-icon svg { width: 11px; height: 11px; }
  .app-title {
    font-size: 12px;
    font-weight: 500;
    color: var(--text-muted);
    letter-spacing: 0.03em;
  }
  .titlebar-controls {
    display: flex;
    gap: 6px;
    -webkit-app-region: no-drag;
  }
  .wbtn {
    width: 28px;
    height: 28px;
    border-radius: 6px;
    border: none;
    background: transparent;
    color: var(--text-muted);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.15s, color 0.15s;
  }
  .wbtn:hover { background: var(--surface2); color: var(--text); }
  .wbtn.close:hover { background: #5a1a1a; color: #f07070; }
  .wbtn svg { width: 12px; height: 12px; }

  /* Main content */
  .main {
    flex: 1;
    display: flex;
    flex-direction: column;
    padding: 28px 32px 20px;
    overflow: hidden;
    gap: 20px;
  }

  .headline {
    display: flex;
    flex-direction: column;
    gap: 4px;
  }
  .headline h1 {
    font-size: 20px;
    font-weight: 600;
    color: var(--text);
    letter-spacing: -0.02em;
  }
  .headline p {
    font-size: 12px;
    color: var(--text-muted);
  }

  /* Form */
  .form-section { display: flex; flex-direction: column; gap: 12px; }

  .field { display: flex; flex-direction: column; gap: 6px; }
  .field label {
    font-size: 11px;
    font-weight: 500;
    color: var(--text-muted);
    letter-spacing: 0.05em;
    text-transform: uppercase;
  }

  .input-row {
    display: flex;
    align-items: center;
    gap: 0;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    transition: border-color 0.15s;
    overflow: hidden;
  }
  .input-row:focus-within { border-color: var(--accent); }

  .input-row input {
    flex: 1;
    background: transparent;
    border: none;
    outline: none;
    padding: 10px 14px;
    font-size: 13px;
    color: var(--text);
    font-family: var(--font-mono);
  }
  .input-row input::placeholder { color: var(--text-dim); }

  .input-row .browse-btn {
    padding: 0 14px;
    height: 100%;
    background: var(--surface2);
    border: none;
    border-left: 1px solid var(--border);
    color: var(--text-muted);
    cursor: pointer;
    font-size: 12px;
    font-family: inherit;
    white-space: nowrap;
    transition: color 0.15s, background 0.15s;
    min-height: 38px;
  }
  .input-row .browse-btn:hover { color: var(--text); background: #252525; }

  .options-row {
    display: flex;
    align-items: center;
    gap: 16px;
  }
  .checkbox-label {
    display: flex;
    align-items: center;
    gap: 7px;
    font-size: 12px;
    color: var(--text-muted);
    cursor: pointer;
    transition: color 0.15s;
  }
  .checkbox-label:hover { color: var(--text); }
  .checkbox-label input[type="checkbox"] {
    width: 14px;
    height: 14px;
    accent-color: var(--accent);
    cursor: pointer;
  }

  .download-btn {
    width: 100%;
    padding: 12px;
    background: var(--accent);
    border: none;
    border-radius: var(--radius);
    color: #0c0c0c;
    font-size: 13px;
    font-weight: 700;
    font-family: inherit;
    letter-spacing: 0.04em;
    cursor: pointer;
    transition: background 0.15s, transform 0.1s;
    text-transform: uppercase;
  }
  .download-btn:hover:not(:disabled) { background: var(--accent-hover); }
  .download-btn:active:not(:disabled) { transform: scale(0.99); }
  .download-btn:disabled {
    background: var(--surface2);
    color: var(--text-dim);
    cursor: not-allowed;
  }

  /* Progress section */
  .progress-section {
    flex: 1;
    display: flex;
    flex-direction: column;
    gap: 10px;
    overflow: hidden;
    min-height: 0;
  }

  .progress-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .progress-label {
    font-size: 11px;
    font-weight: 500;
    color: var(--text-muted);
    letter-spacing: 0.05em;
    text-transform: uppercase;
  }
  .progress-stats {
    font-size: 11px;
    color: var(--text-muted);
    font-family: var(--font-mono);
  }

  .progress-bar-track {
    height: 2px;
    background: var(--surface2);
    border-radius: 2px;
    overflow: hidden;
  }
  .progress-bar-fill {
    height: 100%;
    background: var(--accent);
    border-radius: 2px;
    width: 0%;
    transition: width 0.3s ease;
  }
  .progress-bar-fill.success { background: var(--success); }
  .progress-bar-fill.error { background: var(--error); }

  .log-box {
    flex: 1;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 12px 14px;
    overflow-y: auto;
    font-family: var(--font-mono);
    font-size: 11.5px;
    line-height: 1.7;
    min-height: 0;
  }
  .log-box::-webkit-scrollbar { width: 4px; }
  .log-box::-webkit-scrollbar-track { background: transparent; }
  .log-box::-webkit-scrollbar-thumb { background: var(--border-active); border-radius: 2px; }

  .log-line { color: var(--text-muted); }
  .log-line.info { color: #5a9fd4; }
  .log-line.success { color: var(--success); }
  .log-line.error { color: #c06060; }
  .log-line.accent { color: var(--accent); }
  .log-line.dim { color: var(--text-dim); }

  .log-empty {
    color: var(--text-dim);
    font-style: italic;
  }

  /* Status bar */
  .statusbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-shrink: 0;
  }
  .status-dot {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 11px;
    color: var(--text-dim);
  }
  .dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--text-dim);
  }
  .dot.ready { background: var(--success); }
  .dot.busy { background: var(--accent); animation: pulse 1s infinite; }
  .dot.error { background: var(--error); }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.3; }
  }

  .open-folder-btn {
    font-size: 11px;
    color: var(--text-dim);
    background: none;
    border: none;
    cursor: pointer;
    font-family: inherit;
    padding: 0;
    transition: color 0.15s;
    display: none;
  }
  .open-folder-btn:hover { color: var(--accent); }
  .open-folder-btn.visible { display: block; }
</style>
</head>
<body>

<div class="titlebar">
  <div class="titlebar-left">
    <div class="app-icon">
      <svg viewBox="0 0 12 12" fill="none">
        <polygon points="3,1 11,6 3,11" fill="#0c0c0c"/>
      </svg>
    </div>
    <span class="app-title">Lazy YT Downloader</span>
  </div>
  <div class="titlebar-controls">
    <button class="wbtn" id="btn-min" title="Minimize">
      <svg viewBox="0 0 12 12"><line x1="2" y1="6" x2="10" y2="6" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
    </button>
    <button class="wbtn close" id="btn-close" title="Close">
      <svg viewBox="0 0 12 12"><line x1="2" y1="2" x2="10" y2="10" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/><line x1="10" y1="2" x2="2" y2="10" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
    </button>
  </div>
</div>

<div class="main">
  <div class="headline">
    <h1>Download Video</h1>
    <p>Paste a YouTube URL and choose where to save it.</p>
  </div>

  <div class="form-section">
    <div class="field">
      <label>YouTube URL</label>
      <div class="input-row">
        <input type="text" id="url-input" placeholder="https://www.youtube.com/watch?v=..." spellcheck="false" />
      </div>
    </div>

    <div class="field">
      <label>Save to</label>
      <div class="input-row">
        <input type="text" id="output-input" placeholder="~/Downloads" spellcheck="false" readonly />
        <button class="browse-btn" id="browse-btn">Browse</button>
      </div>
    </div>

    <div class="options-row">
      <label class="checkbox-label">
        <input type="checkbox" id="update-check" />
        Update yt-dlp before download
      </label>
    </div>

    <button class="download-btn" id="download-btn">▶ &nbsp; Download</button>
  </div>

  <div class="progress-section">
    <div class="progress-header">
      <span class="progress-label">Output</span>
      <span class="progress-stats" id="progress-stats"></span>
    </div>
    <div class="progress-bar-track">
      <div class="progress-bar-fill" id="progress-bar"></div>
    </div>
    <div class="log-box" id="log-box">
      <span class="log-empty">Waiting for input...</span>
    </div>
  </div>

  <div class="statusbar">
    <div class="status-dot">
      <div class="dot ready" id="status-dot"></div>
      <span id="status-text">Ready</span>
    </div>
    <button class="open-folder-btn" id="open-folder-btn">Open folder ↗</button>
  </div>
</div>

<script>
  const os = { homedir: () => "" };

  // Elements
  const urlInput = document.getElementById("url-input");
  const outputInput = document.getElementById("output-input");
  const browseBtn = document.getElementById("browse-btn");
  const updateCheck = document.getElementById("update-check");
  const downloadBtn = document.getElementById("download-btn");
  const progressBar = document.getElementById("progress-bar");
  const progressStats = document.getElementById("progress-stats");
  const logBox = document.getElementById("log-box");
  const statusDot = document.getElementById("status-dot");
  const statusText = document.getElementById("status-text");
  const openFolderBtn = document.getElementById("open-folder-btn");

  // Window controls
  document.getElementById("btn-min").onclick = () => window.api.minimize();
  document.getElementById("btn-close").onclick = () => window.api.close();

  // Default output path
  outputInput.value = "";
  outputInput.placeholder = "Click Browse or defaults to ~/Downloads";

  // Browse
  browseBtn.onclick = async () => {
    const folder = await window.api.openFolder();
    if (folder) outputInput.value = folder;
  };

  // Open folder
  openFolderBtn.onclick = () => {
    const p = outputInput.value || (navigator.userAgent.includes("Win") ? "%USERPROFILE%\\Downloads" : "~/Downloads");
    window.api.openInExplorer(p);
  };

  let logEmpty = true;

  function appendLog(text, cls = "") {
    if (logEmpty) {
      logBox.innerHTML = "";
      logEmpty = false;
    }
    const line = document.createElement("div");
    line.className = "log-line" + (cls ? " " + cls : "");
    line.textContent = text;
    logBox.appendChild(line);
    logBox.scrollTop = logBox.scrollHeight;
  }

  function setStatus(state, text) {
    statusDot.className = "dot " + state;
    statusText.textContent = text;
  }

  function resetProgress() {
    progressBar.style.width = "0%";
    progressBar.className = "progress-bar-fill";
    progressStats.textContent = "";
  }

  // Download
  downloadBtn.onclick = async () => {
    const url = urlInput.value.trim();
    if (!url) {
      appendLog("✗ No URL provided.", "error");
      return;
    }

    const outputPath = outputInput.value.trim() || null;

    // Reset UI
    logBox.innerHTML = "";
    logEmpty = false;
    resetProgress();
    openFolderBtn.classList.remove("visible");
    downloadBtn.disabled = true;
    setStatus("busy", "Downloading...");
    appendLog("→ Starting download...", "accent");

    const cleanup = window.api.onDownloadEvent((evt) => {
      switch (evt.type) {
        case "log":
          appendLog(evt.msg);
          break;
        case "info":
          appendLog(`▸ ${evt.title}`, "info");
          if (evt.duration) {
            const m = Math.floor(evt.duration / 60);
            const s = String(evt.duration % 60).padStart(2, "0");
            appendLog(`  Duration: ${m}:${s}`, "dim");
          }
          break;
        case "progress": {
          const pct = Math.round(evt.percent);
          progressBar.style.width = pct + "%";
          const parts = [];
          if (evt.speed) parts.push(evt.speed);
          if (evt.eta && evt.eta !== "Unknown ETA") parts.push(`ETA ${evt.eta}`);
          if (evt.downloaded && evt.total) parts.push(`${evt.downloaded} / ${evt.total}`);
          progressStats.textContent = parts.join("  ·  ");
          break;
        }
        case "finished":
          appendLog(`✔ ${evt.msg}`, "success");
          progressBar.style.width = "100%";
          break;
        case "done":
          appendLog("✔ All done!", "success");
          progressBar.className = "progress-bar-fill success";
          progressBar.style.width = "100%";
          setStatus("ready", "Done");
          downloadBtn.disabled = false;
          openFolderBtn.classList.add("visible");
          cleanup();
          break;
        case "error":
          appendLog(`✗ ${evt.msg}`, "error");
          progressBar.className = "progress-bar-fill error";
          setStatus("error", "Error");
          downloadBtn.disabled = false;
          cleanup();
          break;
      }
    });

    const result = await window.api.startDownload({
      url,
      outputPath: outputPath,
      update: updateCheck.checked,
    });

    // Fallback if events didn't fire done/error
    if (result.code !== 0 && !downloadBtn.disabled === false) {
      setStatus("error", "Failed");
      downloadBtn.disabled = false;
    }
  };

  // Allow Enter key on URL input
  urlInput.addEventListener("keydown", (e) => {
    if (e.key === "Enter") downloadBtn.click();
  });
</script>
</body>
</html>
