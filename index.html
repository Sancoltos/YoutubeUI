<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Lazy YT Downloader</title>
<link rel="stylesheet" href="renderer/style.css" />
</head>
<body>

<div class="titlebar">
  <div class="titlebar-left">
    <div class="app-icon">
      <svg viewBox="0 0 12 12" fill="none">
        <polygon points="3,1 11,6 3,11" fill="#0c0c0c"/>
      </svg>
    </div>
    <span class="app-title">Lazy YT Downloader</span>
  </div>
  <div class="titlebar-controls">
    <button class="wbtn" id="btn-min" title="Minimize">
      <svg viewBox="0 0 12 12"><line x1="2" y1="6" x2="10" y2="6" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
    </button>
    <button class="wbtn close" id="btn-close" title="Close">
      <svg viewBox="0 0 12 12"><line x1="2" y1="2" x2="10" y2="10" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/><line x1="10" y1="2" x2="2" y2="10" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
    </button>
  </div>
</div>

<div class="main">
  <div class="headline">
    <h1>Download Video</h1>
    <p>Paste a YouTube URL and choose where to save it.</p>
  </div>

  <div class="form-section">
    <div class="field">
      <label>YouTube URL</label>
      <div class="input-row">
        <input type="text" id="url-input" placeholder="https://www.youtube.com/watch?v=..." spellcheck="false" />
      </div>
    </div>

    <div class="field">
      <label>Save to</label>
      <div class="input-row">
        <input type="text" id="output-input" placeholder="~/Downloads" spellcheck="false" readonly />
        <button class="browse-btn" id="browse-btn">Browse</button>
      </div>
    </div>

    <div class="options-row">
      <label class="checkbox-label">
        <input type="checkbox" id="update-check" />
        Update yt-dlp before download
      </label>
    </div>

    <button class="download-btn" id="download-btn">▶ &nbsp; Download</button>
  </div>

  <div class="progress-section">
    <div class="progress-header">
      <span class="progress-label">Output</span>
      <span class="progress-stats" id="progress-stats"></span>
    </div>
    <div class="progress-bar-track">
      <div class="progress-bar-fill" id="progress-bar"></div>
    </div>
    <div class="log-box" id="log-box">
      <span class="log-empty">Waiting for input...</span>
    </div>
  </div>

  <div class="statusbar">
    <div class="status-dot">
      <div class="dot ready" id="status-dot"></div>
      <span id="status-text">Ready</span>
    </div>
    <button class="open-folder-btn" id="open-folder-btn">Open folder ↗</button>
  </div>
</div>

<script src="renderer/renderer.js"></script>
</body>
</html>
